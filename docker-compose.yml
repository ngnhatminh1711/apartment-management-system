services:
  postgres:
    image: postgres:16-alpine
    container_name: apartment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apartment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Abc111@
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d apartment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: maven:3.9.11-eclipse-temurin-25
    container_name: apartment-backend
    restart: unless-stopped
    working_dir: /app
    command: mvn spring-boot:run
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/apartment_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: Abc111@
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      JWT_SECRET: 51CKGfW8L3Gsk7USAqpiQWlWOe33XDjzYfJrCHACb8N
      JWT_ACCESS_TOKEN_EXPIRATION: 86400000
      JWT_REFRESH_TOKEN_EXPIRATION: 604800000
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - maven_cache:/root/.m2
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: node:24-alpine
    container_name: apartment-frontend
    restart: unless-stopped
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_APP_NAME: Apartment Management
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  maven_cache:
  frontend_node_modules:
